{% extends 'base.html' %}

{% block content %}
<section class="hero-section hero-activities">
    <h1 class="hero-slogan">
        "สนุกสนาน <span class="text-blue">สืบสาน</span><span class="text-black">ประเพณี</span><span
            class="text-red">เมืองย่า</span>"
    </h1>
</section>

<section class="places-container container">
    <h2 class="section-title">กิจกรรมและเทศกาลสำคัญ</h2>

    <!-- Loop แสดงรายการกิจกรรมจากฐานข้อมูล -->
    {% for activity in activities %}
    <!-- ลิงก์ไปยังหน้าละเอียด activities_detail โดยส่ง id ไปด้วย -->
    <a href="{{ url_for('activity_detail', activity_id=activity.id) }}" style="text-decoration: none; color: inherit;">
        <div class="activity-item">
            <div class="activity-image">
                <img src="{{ activity.image }}" alt="{{ activity.title }}">
            </div>
            <div class="activity-content">
                <div class="activity-item-header">
                    <h1>{{ activity.title }}</h1>
                    <p>{{ activity.date }}</p>
                </div>
                <p>{{ activity.description }}</p>
                <li><strong>พิกัด:</strong> <span class="underline">{{ activity.location }}</span></li>
            </div>
        </div>
    </a>
    {% endfor %}
